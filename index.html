<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Godot-bevy Book Versions</title>
    <style>
        :root {
            --primary-color: #f8f9fa;
            --accent-color: #47a1ff;
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --text-main: #e0e0e0;
            --text-muted: #a0a0a0;
            --border-radius: 12px;
            --shadow: 0 4px 12px rgba(0, 0, 0, 0.5);
            --transition: all 0.2s ease-in-out;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            line-height: 1.6;
            margin: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        header {
            padding: 5rem 2rem 3rem;
            text-align: center;
        }

        header h1 {
            margin: 0;
            font-size: 2.8rem;
            font-weight: 800;
            background: linear-gradient(120deg, #47a1ff, #9b59b6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.03em;
        }

        header p {
            color: var(--text-muted);
            margin-top: 0.75rem;
            font-size: 1.2rem;
        }

        main {
            flex: 1;
            max-width: 500px;
            margin: 0 auto;
            width: 100%;
            padding: 0 1.5rem 5rem;
            box-sizing: border-box;
        }

        .version-list {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .version-card {
            background: var(--card-bg);
            padding: 1.5rem 2rem;
            border-radius: var(--border-radius);
            box-shadow: var(--shadow);
            text-decoration: none;
            color: inherit;
            border: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            align-items: center;
            gap: 2rem;
            transition: var(--transition);
        }

        .version-card:hover {
            transform: scale(1.01);
            background: #252525;
            border-color: var(--accent-color);
        }

        /* Card Content layout */
        .version-name {
            min-width: 140px;
            display: flex;
            flex-direction: row;
            flex-grow: 1;
            gap: 0.5rem;
        }

        .version-tag {
            display: inline-block;
            background: rgba(71, 161, 255, 0.15);
            color: var(--accent-color);
            padding: 0.2rem 0.6rem;
            border-radius: 6px;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            min-width: 50px;
            text-align: center;
        }

        .version-tag.latest {
            background: rgba(204, 46, 191, 0.15);
            color: #c72ecc;
        }

        .version-card h3 {
            margin: 0;
            font-size: 1.4rem;
            white-space: nowrap;
        }

        .arrow {
            color: var(--text-muted);
            font-size: 1.5rem;
            transition: var(--transition);
        }

        .version-card:hover .arrow {
            color: var(--accent-color);
            transform: translateX(5px);
        }

        #nav-info {
            display: none;
            text-align: center;
            margin-bottom: 2rem;
            padding: 1rem;
            background: rgba(255,255,255,0.03);
            border-radius: var(--border-radius);
            border: 1px solid rgba(255,255,255,0.1);
            flex-wrap: wrap;
            align-items: center;
            justify-content: center;
        }

        #page-display {
            display: block;
            color: var(--accent-color);
            font-size: 1rem;
            word-break: break-all;
            padding: 0 0 0 0.5rem;
        }

        .flex-break {
            flex-basis: 100%;
            height: 0;
        }

        #nav-info button {
            background: none;
            border: 1px solid var(--accent-color);
            color: var(--accent-color);
            padding: 0.4rem 1rem;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.8rem;
            transition: var(--transition);
            margin-top: 0.5rem;
            font-weight: bold;

            &:hover {
                background: var(--accent-color);
                color: var(--bg-color);
            }
        }

        footer {
            text-align: center;
            padding: 3rem;
            font-size: 0.9rem;
            color: var(--text-muted);
            border-top: 1px solid rgba(255, 255, 255, 0.05);
        }

        footer a {
            color: var(--accent-color);
            text-decoration: none;
        }

        /* Responsive adjustment for very small screens */
        @media (max-width: 600px) {
            .version-card {
                flex-direction: column;
                align-items: flex-start;
                gap: 0.5rem;
                padding: 1.5rem;
            }

            .version-name {
                min-width: auto;
            }

            .arrow {
                display: none;
            }
        }
    </style>
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const params = new URLSearchParams(window.location.search);
            const page = params.get("page");

            if (page) {
                // Show the status info
                document.getElementById("nav-info").style.display = "flex";
                document.getElementById("page-display").textContent = page;

                // Update all version links
                document.querySelectorAll(".version-card").forEach((card) => {
                    // Remove leading slash if any
                    const baseHref = card.getAttribute("href").replace(/\/+$/, "");
                    // Remove trailing slash if any
                    const normalizedPage = page.replace(/^\/+/, "");
                    card.href = `${baseHref}/${normalizedPage}`;
                });
            }
        });

        function clearPageParam() {
            const url = new URL(window.location);
            url.searchParams.delete("page");
            window.location.href = url.toString();
        }
    </script>
</head>
<body>

<header>
    <h1>The <code>godot-bevy</code> Book</h1>
    <p>Select a documentation version</p>
</header>

<main>
    <div id="nav-info">
        <div style="color: var(--text-muted); font-size: 0.9rem;">Navigating to:</div>
        <code id="page-display"></code>
        <div class="flex-break"></div>
        <button onclick="clearPageParam()">
            Navigate to "Introduction" instead
        </button>
    </div>

    <div class="version-list">
        
        <a href="main" class="version-card" data-version-id="main">
            <div class="version-tag latest">
                Latest
            </div>
            <div class="version-name">
                <h3>Main Branch</h3>
            </div>
            <div class="arrow">→</div>
        </a>
        
        <a href="v0.10.0" class="version-card" data-version-id="v0.10.0">
            <div class="version-tag ">
                Stable
            </div>
            <div class="version-name">
                <h3>v0.10.0</h3>
            </div>
            <div class="arrow">→</div>
        </a>
        
    </div>
</main>

</body>
</html>
